<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LexiTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              academy: {
                50: '#eff6ff', 
                100: '#dbeafe', 
                200: '#bfdbfe', 
                300: '#93c5fd', 
                400: '#60a5fa', 
                500: '#3b82f6', 
                600: '#1d4ed8', // Darker Primary (Was 700)
                700: '#1e40af', // Darker Hover (Was 800)
                800: '#1e3a8a', // Darker Sidebar/Header (Was 900)
                900: '#172554', // Deep Text (Was 950)
                950: '#0f172a', // Almost Black
              },
              gray: {
                50: '#f9fafb',
                100: '#f3f4f6',
                200: '#e5e7eb',
                300: '#d1d5db',
                400: '#9ca3af',
                500: '#6b7280',
                600: '#4b5563',
                700: '#374151',
                800: '#1f2937',
                900: '#111827',
              }
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              serif: ['Georgia', 'Cambria', 'Times New Roman', 'serif'],
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      body {
        font-family: 'Inter', sans-serif;
        background-color: #eff6ff; /* academy-50 */
        color: #1f2937; /* gray-800 */
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #93c5fd; /* academy-300 */
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #60a5fa; /* academy-400 */
      }
    </style>

  }
}
</script>
